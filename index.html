<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Delta Trade Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        header {
            margin-bottom: 25px;
        }
        header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #00ccff;
            font-size: 16px;
        }

        .main {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            width: 380px;
            padding: 20px;
        }

        .panel h2 {
            margin-bottom: 15px;
            font-size: 22px;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            background: #111;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .stat {
            text-align: center;
        }
        .stat small {
            display: block;
            font-size: 12px;
            color: #888;
        }
        .stat span {
            font-size: 20px;
            font-weight: bold;
        }

        .slots {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .slot {
            background: #222;
            border: 2px dashed #444;
            border-radius: 12px;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .slot:hover {
            border-color: #00ccff;
            background: #2a2a2a;
        }
        .slot.added {
            border-style: solid;
            border-color: #00ccff;
            background: #1f2a1f;
        }

        .center {
            margin-top: 80px;
        }
        .center-box {
            background: #2a2a00;
            border: 2px solid #ffaa00;
            border-radius: 16px;
            padding: 20px 30px;
            width: 280px;
        }
        .center-box h3 {
            color: #ffaa00;
            margin-bottom: 10px;
        }
        button.reset {
            background: #ff3333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
        }

        #result {
            font-size: 32px;
            margin: 30px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>PROJECT DELTA TRADE CALCULATOR</h1>
        <p class="subtitle">Calcule tes trades rapidement et échange en toute confiance !</p>
    </header>

    <div class="main">

        <!-- Votre Offre -->
        <div class="panel">
            <h2>Votre offre</h2>
            <div class="stats">
                <div class="stat"><small>VALEUR</small><span id="leftValue">0</span></div>
                <div class="stat"><small>PRIX</small><span id="leftPrice">0</span></div>
                <div class="stat"><small>DEMANDE</small><span id="leftDemand" style="color:#ff4444;">0/10</span></div>
            </div>
            <div class="slots" id="leftSlots"></div>
        </div>

        <!-- Centre -->
        <div class="center">
            <div class="center-box">
                <h3>Commerce équitable</h3>
                <button class="reset" onclick="resetAll()">🔄 Réinitialiser</button>
            </div>
        </div>

        <!-- Leur Offre -->
        <div class="panel">
            <h2>Leur offre</h2>
            <div class="stats">
                <div class="stat"><small>VALEUR</small><span id="rightValue">0</span></div>
                <div class="stat"><small>PRIX</small><span id="rightPrice">0</span></div>
                <div class="stat"><small>DEMANDE</small><span id="rightDemand" style="color:#ff4444;">0/10</span></div>
            </div>
            <div class="slots" id="rightSlots"></div>
        </div>

    </div>

    <div id="result">⚖️ FAIR TRADE</div>

    <script>
        const itemsDB = { /* Même base de données que précédemment */ 
            "Duct Tape": 420, "Metal Bolts": 102, "Metal Nuts": 96, "Super Glue": 660,
            "GPU": 15000, "CPU": 4800, "SSD": 2400, "RAM": 1080,
            "50g Gold": 17100, "Gold Watch": 15000, "EDF Flare": 375000,
            "Cassette": 375000, "TFZ98S": 550000, "R700": 500000, "AS-VAL": 110000,
            "M4A1": 70000, "God FAST MT": 950000, "HSPV": 375000
            // ... tu peux ajouter tous les autres items ici
        };

        let leftItems = [], rightItems = [];

        function createSlots(containerId, side) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                const slot = document.createElement('div');
                slot.className = 'slot';
                slot.innerHTML = `<span style="color:#666; font-size:40px;">+</span>`;
                slot.onclick = () => openItemSelector(side, slot);
                container.appendChild(slot);
            }
        }

        function openItemSelector(side, slotElement) {
            const search = prompt("Rechercher un item (ex: GPU, EDF Flare, M4A1) :");
            if (!search) return;

            const filtered = Object.keys(itemsDB).filter(name => 
                name.toLowerCase().includes(search.toLowerCase())
            );

            if (filtered.length === 0) {
                alert("Item non trouvé");
                return;
            }

            const chosen = prompt("Choisis un item :\n" + filtered.join("\n"));
            if (!chosen || !itemsDB[chosen]) return;

            slotElement.classList.add('added');
            slotElement.innerHTML = `<small>${chosen}<br><b>${itemsDB[chosen].toLocaleString()} ₽</b></small>`;
            slotElement.onclick = null;

            if (side === 'left') leftItems.push(chosen);
            else rightItems.push(chosen);

            updateTotals();
        }

        function updateTotals() {
            const leftTotal = leftItems.reduce((a, b) => a + (itemsDB[b] || 0), 0);
            const rightTotal = rightItems.reduce((a, b) => a + (itemsDB[b] || 0), 0);

            document.getElementById('leftValue').textContent = leftTotal.toLocaleString();
            document.getElementById('rightValue').textContent = rightTotal.toLocaleString();

            const diff = rightTotal - leftTotal;
            const result = document.getElementById('result');

            if (diff > 50000) result.innerHTML = "🟢 EXCELLENT WIN";
            else if (diff > 10000) result.innerHTML = "🟢 WIN";
            else if (diff < -50000) result.innerHTML = "🔴 BIG LOSS";
            else if (diff < -10000) result.innerHTML = "🔴 LOSS";
            else result.innerHTML = "⚖️ FAIR TRADE";
        }

        function resetAll() {
            if (confirm("Réinitialiser tout ?")) {
                leftItems = [];
                rightItems = [];
                createSlots('leftSlots', 'left');
                createSlots('rightSlots', 'right');
                updateTotals();
            }
        }

        // Initialisation
        createSlots('leftSlots', 'left');
        createSlots('rightSlots', 'right');
    </script>

</body>
</html>
