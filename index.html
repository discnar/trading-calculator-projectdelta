<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Delta Trade Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 28px; 
            font-weight: bold; 
        }
        .main { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            flex-wrap: wrap; 
        }
        .panel {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            width: 440px;
        }
        .panel h2 { 
            color: #ff4444; 
            margin-bottom: 15px; 
            text-align: center; 
        }
        .slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .slot {
            background: #222;
            border: 2px dashed #444;
            border-radius: 12px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
            text-align: center;
        }
        .slot:hover { border-color: #00ccff; }
        .slot.added {
            border: 2px solid #00ccff;
            background: #1f2a1f;
        }
        .slot .name { font-weight: bold; font-size: 13px; }
        .slot .price { color: #ffcc00; font-size: 12px; }

        .result-container {
            margin: 30px auto;
            max-width: 460px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 4px solid;
        }
        .loss { background: #2a0f0f; border-color: #ff3333; }
        .win { background: #0f2a0f; border-color: #33ff33; }
        .fair { background: #2a2a0f; border-color: #ffcc33; }
        .result-icon { font-size: 70px; margin-bottom: 10px; }
        .result-title { font-size: 26px; font-weight: bold; margin-bottom: 8px; }
        .diff-label { font-size: 17px; color: #ccc; }
        .diff-value { font-size: 48px; font-weight: bold; margin: 10px 0; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 720px;
            border-radius: 16px;
            padding: 20px;
        }
        .modal-search {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #111;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            max-height: 65vh;
            overflow-y: auto;
        }
        .modal-card {
            background: #222;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-card:hover {
            background: #00ccff;
            color: black;
            transform: scale(1.03);
        }

        button.reset {
            background: #ff3333;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header">PROJECT DELTA TRADE CALCULATOR</div>

    <div class="main">
        <div class="panel">
            <h2>TU DONNES</h2>
            <div class="slots" id="leftSlots"></div>
            <h3 style="text-align:center; margin-top:15px;">Total : <span id="leftTotal">0</span> $</h3>
        </div>

        <div class="panel">
            <h2>ILS DONNENT</h2>
            <div class="slots" id="rightSlots"></div>
            <h3 style="text-align:center; margin-top:15px;">Total : <span id="rightTotal">0</span> $</h3>
        </div>
    </div>

    <div id="resultContainer" class="result-container fair">
        <div id="resultIcon" class="result-icon">⚖️</div>
        <div id="resultTitle" class="result-title">ÉCHANGE ÉQUITABLE</div>
        <div class="diff-label">Différence :</div>
        <div id="diffValue" class="diff-value">0 $</div>
        <button class="reset" onclick="resetAll()">🔄 Réinitialiser</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:15px;">Rechercher un item</h2>
            <input type="text" class="modal-search" id="modalSearch" placeholder="Tape le nom de l'item...">
            <div class="modal-grid" id="modalGrid"></div>
        </div>
    </div>

    <script>
        const itemsDB = {
            // Loot
            "Duct Tape": 420, "Metal Bolts": 102, "Metal Nuts": 96, "Metal Nails": 90,
            "Super Glue": 660, "Cotton": 300, "Ripstop": 720, "Aramid": 1020,
            "Linen": 1200, "Gunpowder": 360, "Steel Pipe": 420, "Metal": 270,
            "Wooden Planks": 174, "Motor Oil": 1080, "Fuze": 210, "Weapon Part": 1200,

            // Weapons Standard
            "ADAR 2-15": "8000-15000", "AKMN": 10000, "MP5SD": "5000-10000",
            "Saiga 12": "10000-20000", "M4A1": 60000, "MK12": 70000,
            "AS Val": 110000, "SVD": "7500-15000", "PKM": 22500, "RPG": 30000,
            "TFZ98S": "500000-600000", "R700": 500000,

            // God Versions
            "God M4A1": 550000, "God AKMN": "35000-45000", "God Saiga": 35000,
            "God TFZ98S": "500000-600000", "God Fast MT": 950000,

            // Magazines
            "M4 Drum": 275000, "AKMN Drum": 7500, "Saiga Drum": "10000-15000",

            // Armures
            "Fast MT Helmet": 20000, "Fast MT God": 950000, "Altyn": 22500,
            "T-Shield": 750000, "HSPV": 375000, "IOTV Gen4": 125000,
            "JPC Rush": 70000,

            // Attachments
            "SOCOM556": 250000, "ACOG": 22500, "REAP-IR": 95000,
            "Sniper Scope": 75000, "RK3": 7500, "PT1": 7500,

            // Others
            "EDF Flare": "350000-400000", "Cassette Player": 375000,
            "Repair Kit": 15000, "Gorka Pants": 3000, "Gorka Shirt": 3000
        };

        let leftItems = [], rightItems = [];

        function getPrice(value) {
            if (typeof value === 'number') return value;
            if (typeof value === 'string' && value.includes('-')) {
                const [min, max] = value.split('-').map(v => parseInt(v.replace(/[^0-9]/g, '')));
                return Math.round((min + max) / 2);
            }
            return parseInt(value) || 0;
        }

        function createSlots() {
            const left = document.getElementById('leftSlots');
            const right = document.getElementById('rightSlots');
            left.innerHTML = ''; right.innerHTML = '';
            for (let i = 0; i < 6; i++) {
                left.appendChild(createSlot('left'));
                right.appendChild(createSlot('right'));
            }
        }

        function createSlot(side) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.innerHTML = `<span style="font-size:42px;">+</span><small>Ajouter</small>`;
            slot.onclick = () => openModal(side);
            return slot;
        }

        function openModal(side) {
            window.currentSide = side;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalSearch').value = "";
            renderModalItems("");
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function renderModalItems(filter) {
            const container = document.getElementById('modalGrid');
            container.innerHTML = "";
            Object.keys(itemsDB).sort().forEach(name => {
                if (!name.toLowerCase().includes(filter.toLowerCase())) return;
                const price = getPrice(itemsDB[name]);
                const card = document.createElement('div');
                card.className = "modal-card";
                card.innerHTML = `<strong>${name}</strong><br><small>${price.toLocaleString()} $</small>`;
                card.onclick = () => addItem(name);
                container.appendChild(card);
            });
        }

        function addItem(name) {
            const side = window.currentSide;
            if (side === 'left') leftItems.push(name);
            else rightItems.push(name);
            renderAllSlots();
            updateResult();
            closeModal();
        }

        function renderAllSlots() {
            renderSide('leftSlots', leftItems, 'left');
            renderSide('rightSlots', rightItems, 'right');
        }

        function renderSide(containerId, itemsList, side) {
            const container = document.getElementById(containerId);
            const slots = container.children;
            Array.from(slots).forEach((slot, index) => {
                if (index < itemsList.length) {
                    const name = itemsList[index];
                    const price = getPrice(itemsDB[name]);
                    slot.classList.add('added');
                    slot.innerHTML = `<div class="name">${name}</div><div class="price">${price.toLocaleString()} $</div>`;
                    slot.onclick = () => removeItem(side, index);
                } else {
                    slot.classList.remove('added');
                    slot.innerHTML = `<span style="font-size:42px;">+</span><small>Ajouter</small>`;
                    slot.onclick = () => openModal(side);
                }
            });
        }

        function removeItem(side, index) {
            if (side === 'left') leftItems.splice(index, 1);
            else rightItems.splice(index, 1);
            renderAllSlots();
            updateResult();
        }

        function updateResult() {
            const leftTotal = leftItems.reduce((sum, name) => sum + getPrice(itemsDB[name]), 0);
            const rightTotal = rightItems.reduce((sum, name) => sum + getPrice(itemsDB[name]), 0);

            document.getElementById('leftTotal').textContent = leftTotal.toLocaleString();
            document.getElementById('rightTotal').textContent = rightTotal.toLocaleString();

            const diff = rightTotal - leftTotal;
            const container = document.getElementById('resultContainer');
            const icon = document.getElementById('resultIcon');
            const title = document.getElementById('resultTitle');
            const valueEl = document.getElementById('diffValue');

            valueEl.textContent = (diff >= 0 ? "+" : "") + diff.toLocaleString() + " $";

            if (diff > 600) {
                container.className = "result-container win";
                icon.textContent = "✅";
                title.textContent = "BON COMMERCE";
                title.style.color = "#33ff33";
            } else if (diff < -600) {
                container.className = "result-container loss";
                icon.textContent = "❌";
                title.textContent = "PERTE DE COMMERCE";
                title.style.color = "#ff3333";
            } else {
                container.className = "result-container fair";
                icon.textContent = "⚖️";
                title.textContent = "ÉCHANGE ÉQUITABLE";
                title.style.color = "#ffcc33";
            }
        }

        function resetAll() {
            if (confirm("Réinitialiser tout ?")) {
                leftItems = [];
                rightItems = [];
                renderAllSlots();
                updateResult();
            }
        }

        document.getElementById('modalSearch').addEventListener('input', (e) => renderModalItems(e.target.value));

        createSlots();
        updateResult();
    </script>
</body>
</html>
