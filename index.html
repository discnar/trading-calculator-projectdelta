<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Delta Trade Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 25px; font-size: 26px; font-weight: bold; }
        .main { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .panel {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            width: 420px;
        }
        .panel h2 { color: #ff4444; margin-bottom: 15px; text-align: center; }
        .slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .slot {
            background: #222;
            border: 2px dashed #444;
            border-radius: 12px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            padding: 5px;
            text-align: center;
        }
        .slot:hover { border-color: #00ccff; background: #2a2a2a; }
        .slot.added {
            border-style: solid;
            border-color: #00ccff;
            background: #1f2a1f;
        }
        .slot .name { font-size: 13px; font-weight: bold; }
        .slot .price { font-size: 12px; color: #ffcc00; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 720px;
            border-radius: 16px;
            padding: 20px;
        }
        .modal-search {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #111;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            max-height: 65vh;
            overflow-y: auto;
        }
        .modal-card {
            background: #222;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
        }
        .modal-card:hover {
            background: #00ccff;
            color: black;
            transform: scale(1.05);
        }
        .result {
            text-align: center;
            font-size: 32px;
            margin: 30px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">PROJECT DELTA TRADE CALCULATOR</div>

    <div class="main">
        <!-- TU DONNES -->
        <div class="panel">
            <h2>TU DONNES</h2>
            <div class="slots" id="leftSlots"></div>
            <h3 style="text-align:center; margin-top:15px;">Total : <span id="leftTotal">0</span> ₽</h3>
        </div>

        <!-- ILS DONNENT -->
        <div class="panel">
            <h2>ILS DONNENT</h2>
            <div class="slots" id="rightSlots"></div>
            <h3 style="text-align:center; margin-top:15px;">Total : <span id="rightTotal">0</span> ₽</h3>
        </div>
    </div>

    <div class="result" id="result">⚖️ FAIR TRADE</div>

    <!-- MODAL RECHERCHE -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:15px;">Rechercher un item</h2>
            <input type="text" class="modal-search" id="modalSearch" placeholder="Tape le nom de l'item...">
            <div class="modal-grid" id="modalGrid"></div>
        </div>
    </div>

    <script>
        const itemsDB = {
            "Duct Tape": 420, "Metal Bolts": 102, "Metal Nuts": 96, "Metal Nails": 90,
            "Super Glue": 660, "Cotton": 300, "Ripstop": 720, "Aramid": 1020,
            "Linen": 1200, "Gunpowder": 360, "Steel Pipe": 420, "Metal": 270,
            "Wooden Planks": 174, "Motor Oil": 1080, "Fuze": 210, "Weapon Part": 1200,
            "Copper Coil": 390, "AA Battery": 450, "Smartphone": 6000,
            "GPU": 15000, "SSD": 2400, "RAM": 1080, "CPU": 4800,
            "CPU Fan": 480, "PSU": 3000,
            "50g Gold": 17100, "Statue of Solter": 5940, "SPS": 24000,
            "Gold Watch": 15000, "Gold Tix": 7200, "Anton Plushie": 15000,
            "EDF Flare": 375000, "Cassette": 375000, "Repair Kit": 15000,
            "Fast MT": 20000, "Altyn": 22500, "Quad NVG": 65000,
            "TFZ98S": 550000, "R700": 500000, "AS-VAL": 110000,
            "M4A1": 70000, "MK12": 70000, "MK23": 15000,
            "SVD": 15000, "RPG": 27500, "Saiga": 15000,
            "MP5SD": 5000, "AKMN": 9000,
            "God M4A1": 525000, "God FAST MT": 950000,
            "HSPV": 375000, "M4A1 Drum Mag": 275000
        };

        let leftItems = [], rightItems = [];
        let currentSide = null;

        function createSlots() {
            const left = document.getElementById('leftSlots');
            const right = document.getElementById('rightSlots');
            for (let i = 0; i < 6; i++) {
                left.appendChild(createSlot('left'));
                right.appendChild(createSlot('right'));
            }
        }

        function createSlot(side) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.innerHTML = `<span style="font-size:35px;">+</span><small>Ajouter un élément</small>`;
            slot.onclick = () => openModal(side);
            return slot;
        }

        function openModal(side) {
            currentSide = side;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalSearch').value = "";
            renderModalItems("");
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function renderModalItems(filter) {
            const container = document.getElementById('modalGrid');
            container.innerHTML = "";

            Object.keys(itemsDB).forEach(name => {
                if (!name.toLowerCase().includes(filter.toLowerCase())) return;

                const price = itemsDB[name];
                const card = document.createElement('div');
                card.className = "modal-card";
                card.innerHTML = `<strong>${name}</strong><br><small>${price.toLocaleString()} ₽</small>`;
                card.onclick = () => { addItem(name); closeModal(); };
                container.appendChild(card);
            });
        }

        function addItem(name) {
            if (currentSide === 'left') leftItems.push(name);
            else rightItems.push(name);
            renderAllSlots();
            updateTotals();
        }

        function renderAllSlots() {
            renderSide('leftSlots', leftItems);
            renderSide('rightSlots', rightItems);
        }

        function renderSide(containerId, itemsList) {
            const container = document.getElementById(containerId);
            const slots = container.children;
            slots.forEach((slot, index) => {
                if (index < itemsList.length) {
                    const name = itemsList[index];
                    slot.classList.add('added');
                    slot.innerHTML = `<div class="name">${name}</div><div class="price">${itemsDB[name].toLocaleString()} ₽</div>`;
                    slot.onclick = null;
                }
            });
        }

        function updateTotals() {
            const leftTotal = leftItems.reduce((sum, name) => sum + itemsDB[name], 0);
            const rightTotal = rightItems.reduce((sum, name) => sum + itemsDB[name], 0);

            document.getElementById('leftTotal').textContent = leftTotal.toLocaleString();
            document.getElementById('rightTotal').textContent = rightTotal.toLocaleString();

            const diff = rightTotal - leftTotal;
            const res = document.getElementById('result');
            if (diff > 50000) res.textContent = "🟢 EXCELLENT WIN";
            else if (diff > 10000) res.textContent = "🟢 WIN";
            else if (diff < -50000) res.textContent = "🔴 BIG LOSS";
            else if (diff < -10000) res.textContent = "🔴 LOSS";
            else res.textContent = "⚖️ FAIR TRADE";
        }

        // Recherche dans modal
        document.getElementById('modalSearch').addEventListener('input', (e) => renderModalItems(e.target.value));

        // Démarrage
        createSlots();
    </script>
</body>
</html>
