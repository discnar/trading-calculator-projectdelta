<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Delta Trade Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: bold;
        }
        .main {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .panel {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            width: 420px;
        }
        .panel h2 {
            color: #ff4444;
            margin-bottom: 15px;
            text-align: center;
        }
        .slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .slot {
            background: #222;
            border: 2px dashed #444;
            border-radius: 12px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .slot:hover {
            border-color: #00ccff;
            background: #2a2a2a;
        }
        .slot.added {
            border-style: solid;
            border-color: #00ccff;
            background: #1f2a1f;
        }
        .slot span {
            font-size: 35px;
            margin-bottom: 5px;
        }

        /* Modal de recherche */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 720px;
            border-radius: 16px;
            padding: 20px;
        }
        .modal-search {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #111;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            max-height: 65vh;
            overflow-y: auto;
        }
        .modal-card {
            background: #222;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-card:hover {
            background: #00ccff;
            color: black;
            transform: scale(1.05);
        }
        .result {
            text-align: center;
            font-size: 32px;
            margin: 30px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">PROJECT DELTA TRADE CALCULATOR</div>

    <div class="main">

        <!-- TU DONNES -->
        <div class="panel">
            <h2>TU DONNES</h2>
            <div class="slots" id="leftSlots"></div>
            <h3 style="text-align:center; margin-top:15px;">Total : <span id="leftTotal">0</span> ₽</h3>
        </div>

        <!-- ILS DONNENT -->
        <div class="panel">
            <h2>ILS DONNENT</h2>
            <div class="slots" id="rightSlots"></div>
            <h3 style="text-align:center; margin-top:15px;">Total : <span id="rightTotal">0</span> ₽</h3>
        </div>

    </div>

    <div class="result" id="result">⚖️ FAIR TRADE</div>

    <!-- MODAL RECHERCHE -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:15px;">Rechercher un item</h2>
            <input type="text" class="modal-search" id="modalSearch" placeholder="Tape le nom de l'item...">
            <div class="modal-grid" id="modalGrid"></div>
        </div>
    </div>

    <script>
        const itemsDB = {
            "Duct Tape": {price: 420, emoji: "📦"},
            "Super Glue": {price: 660, emoji: "🧪"},
            "GPU": {price: 15000, emoji: "💻"},
            "CPU": {price: 4800, emoji: "🔧"},
            "SSD": {price: 2400, emoji: "💾"},
            "50g Gold": {price: 17100, emoji: "🪙"},
            "Gold Watch": {price: 15000, emoji: "⌚"},
            "EDF Flare": {price: 375000, emoji: "🚀"},
            "Cassette": {price: 375000, emoji: "📼"},
            "TFZ98S": {price: 550000, emoji: "🔫"},
            "R700": {price: 500000, emoji: "🔫"},
            "AS-VAL": {price: 110000, emoji: "🔫"},
            "M4A1": {price: 70000, emoji: "🔫"},
            "God FAST MT": {price: 950000, emoji: "🛡️"},
            "HSPV": {price: 375000, emoji: "🛡️"},
            "Quad NVG": {price: 65000, emoji: "👓"},
            "Fast MT": {price: 20000, emoji: "🪖"},
            "Altyn": {price: 22500, emoji: "🪖"}
        };

        let leftItems = [], rightItems = [];
        let currentSide = null;

        function createSlots() {
            const left = document.getElementById('leftSlots');
            const right = document.getElementById('rightSlots');
            
            for (let i = 0; i < 6; i++) {
                const slotL = createSlot('left');
                const slotR = createSlot('right');
                left.appendChild(slotL);
                right.appendChild(slotR);
            }
        }

        function createSlot(side) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.innerHTML = `<span>+</span><small>Ajouter un élément</small>`;
            slot.onclick = () => openSearchModal(side);
            return slot;
        }

        function openSearchModal(side) {
            currentSide = side;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalSearch').focus();
            renderModalItems("");
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function renderModalItems(filter) {
            const container = document.getElementById('modalGrid');
            container.innerHTML = "";

            Object.keys(itemsDB).forEach(name => {
                if (!name.toLowerCase().includes(filter.toLowerCase())) return;

                const item = itemsDB[name];
                const card = document.createElement('div');
                card.className = "modal-card";
                card.innerHTML = `
                    <div style="font-size:45px;">${item.emoji}</div>
                    <strong>${name}</strong><br>
                    <small>${item.price.toLocaleString()} ₽</small>
                `;
                card.onclick = () => {
                    addItem(name);
                    closeModal();
                };
                container.appendChild(card);
            });
        }

        function addItem(name) {
            if (currentSide === 'left') leftItems.push(name);
            else rightItems.push(name);
            renderAddedItems();
            updateTotals();
        }

        function renderAddedItems() {
            // On peut améliorer ça plus tard pour remplacer les slots
            console.log("Ajouté :", leftItems, rightItems);
        }

        function updateTotals() {
            const leftTotal = leftItems.reduce((sum, n) => sum + itemsDB[n].price, 0);
            const rightTotal = rightItems.reduce((sum, n) => sum + itemsDB[n].price, 0);

            document.getElementById('leftTotal').textContent = leftTotal.toLocaleString();
            document.getElementById('rightTotal').textContent = rightTotal.toLocaleString();

            const diff = rightTotal - leftTotal;
            const res = document.getElementById('result');

            if (diff > 50000) res.textContent = "🟢 EXCELLENT WIN";
            else if (diff > 10000) res.textContent = "🟢 WIN";
            else if (diff < -50000) res.textContent = "🔴 BIG LOSS";
            else if (diff < -10000) res.textContent = "🔴 LOSS";
            else res.textContent = "⚖️ FAIR TRADE";
        }

        // Recherche dans le modal
        document.getElementById('modalSearch').addEventListener('input', (e) => {
            renderModalItems(e.target.value);
        });

        // Initialisation
        createSlots();
    </script>
</body>
</html>
