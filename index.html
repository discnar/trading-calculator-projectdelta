<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Delta Trade Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
        }
        .search {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 30px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #1f1f1f;
            color: white;
            font-size: 17px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid #333;
        }
        .card:hover {
            transform: scale(1.05);
            border-color: #00ccff;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
        }
        .card img {
            width: 80px;
            height: 80px;
            background: #333;
            border-radius: 8px;
            margin-bottom: 8px;
            object-fit: contain;
        }
        .card h3 {
            font-size: 14px;
            margin: 6px 0;
        }
        .card .price {
            color: #ffcc00;
            font-weight: bold;
        }
        .offers {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
            flex-wrap: wrap;
        }
        .panel {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            width: 380px;
        }
        .added {
            background: #1f2a1f;
            border: 2px solid #00ccff;
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
        }
        #result {
            text-align: center;
            font-size: 32px;
            margin: 30px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>PROJECT DELTA TRADE CALCULATOR</h1>
    <input type="text" class="search" id="search" placeholder="Rechercher un item... (ex: GPU, EDF Flare, M4A1)">

    <div class="grid" id="itemGrid"></div>

    <div class="offers">
        <div class="panel">
            <h2>Votre offre</h2>
            <div id="leftOffer"></div>
            <h3>Total : <span id="leftTotal">0</span> ₽</h3>
        </div>

        <div class="panel">
            <h2>Leur offre</h2>
            <div id="rightOffer"></div>
            <h3>Total : <span id="rightTotal">0</span> ₽</h3>
        </div>
    </div>

    <div id="result">⚖️ FAIR TRADE</div>

    <script>
        const itemsDB = {
            "Duct Tape": {price: 420, img: "📦"},
            "Super Glue": {price: 660, img: "🧪"},
            "GPU": {price: 15000, img: "💻"},
            "CPU": {price: 4800, img: "🔧"},
            "SSD": {price: 2400, img: "💾"},
            "50g Gold": {price: 17100, img: "🪙"},
            "Gold Watch": {price: 15000, img: "⌚"},
            "EDF Flare": {price: 375000, img: "🚀"},
            "Cassette": {price: 375000, img: "📼"},
            "TFZ98S": {price: 550000, img: "🔫"},
            "R700": {price: 500000, img: "🔫"},
            "AS-VAL": {price: 110000, img: "🔫"},
            "M4A1": {price: 70000, img: "🔫"},
            "God FAST MT": {price: 950000, img: "🛡️"},
            "HSPV": {price: 375000, img: "🛡️"},
            "Quad NVG": {price: 65000, img: "👓"}
        };

        let leftItems = [];
        let rightItems = [];

        const grid = document.getElementById('itemGrid');
        const searchInput = document.getElementById('search');

        function renderGrid(filter = "") {
            grid.innerHTML = "";

            Object.keys(itemsDB).forEach(name => {
                if (!name.toLowerCase().includes(filter.toLowerCase())) return;

                const data = itemsDB[name];
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <div style="font-size:50px;">${data.img}</div>
                    <h3>${name}</h3>
                    <div class="price">${data.price.toLocaleString()} ₽</div>
                `;
                card.onclick = () => addItem(name);
                grid.appendChild(card);
            });
        }

        function addItem(name) {
            const side = confirm("Ajouter à Votre offre ? (OK = Votre offre | Annuler = Leur offre)") ? 'left' : 'right';

            if (side === 'left') {
                leftItems.push(name);
                renderAdded('leftOffer', leftItems);
            } else {
                rightItems.push(name);
                renderAdded('rightOffer', rightItems);
            }
            updateTotals();
        }

        function renderAdded(containerId, list) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            list.forEach((name, index) => {
                const div = document.createElement('div');
                div.className = "added";
                div.innerHTML = `${name} — ${itemsDB[name].price.toLocaleString()} ₽ 
                    <button onclick="removeItem('${containerId}', ${index})" style="color:red;">×</button>`;
                container.appendChild(div);
            });
        }

        window.removeItem = function(containerId, index) {
            if (containerId === 'leftOffer') leftItems.splice(index, 1);
            else rightItems.splice(index, 1);
            renderAdded(containerId, containerId === 'leftOffer' ? leftItems : rightItems);
            updateTotals();
        };

        function updateTotals() {
            const leftTotal = leftItems.reduce((sum, name) => sum + itemsDB[name].price, 0);
            const rightTotal = rightItems.reduce((sum, name) => sum + itemsDB[name].price, 0);

            document.getElementById('leftTotal').textContent = leftTotal.toLocaleString();
            document.getElementById('rightTotal').textContent = rightTotal.toLocaleString();

            const diff = rightTotal - leftTotal;
            const resultEl = document.getElementById('result');

            if (diff > 50000) resultEl.textContent = "🟢 EXCELLENT WIN";
            else if (diff > 10000) resultEl.textContent = "🟢 WIN";
            else if (diff < -50000) resultEl.textContent = "🔴 BIG LOSS";
            else if (diff < -10000) resultEl.textContent = "🔴 LOSS";
            else resultEl.textContent = "⚖️ FAIR TRADE";
        }

        // Recherche en temps réel
        searchInput.addEventListener('input', () => renderGrid(searchInput.value));

        // Affichage initial
        renderGrid();
    </script>

</body>
</html>
