<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Delta Trade Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            position: relative;
            min-height: 100vh;
        }
        .header { text-align: center; margin-bottom: 25px; font-size: 26px; font-weight: bold; }
        .main { display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .panel {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            width: 420px;
        }
        .panel h2 { color: #ff4444; margin-bottom: 15px; text-align: center; }
        .slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .slot {
            background: #222;
            border: 2px dashed #444;
            border-radius: 12px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            padding: 5px;
            text-align: center;
            font-size: 13px;
        }
        .slot:hover { border-color: #00ccff; }
        .slot.added {
            border: 2px solid #00ccff;
            background: #1f2a1f;
        }
        .slot .name { font-weight: bold; }
        .slot .price { color: #ffcc00; font-size: 12px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 720px;
            border-radius: 16px;
            padding: 20px;
        }
        .modal-search {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #111;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            max-height: 65vh;
            overflow-y: auto;
        }
        .modal-card {
            background: #222;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
        }
        .modal-card:hover {
            background: #00ccff;
            color: black;
            transform: scale(1.05);
        }
        .result {
            text-align: center;
            font-size: 32px;
            margin: 30px 0;
            font-weight: bold;
        }
        .language-bar {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #333;
            z-index: 2000;
        }
        .language-bar select {
            background: #222;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="header" id="title">PROJECT DELTA TRADE CALCULATOR</div>

    <div class="main">
        <div class="panel">
            <h2 id="leftTitle">TU DONNES</h2>
            <div class="slots" id="leftSlots"></div>
            <h3 style="text-align:center; margin-top:15px;">Total : <span id="leftTotal">0</span> ₽</h3>
        </div>

        <div class="panel">
            <h2 id="rightTitle">ILS DONNENT</h2>
            <div class="slots" id="rightSlots"></div>
            <h3 style="text-align:center; margin-top:15px;">Total : <span id="rightTotal">0</span> ₽</h3>
        </div>
    </div>

    <div class="result" id="result">⚖️ ÉCHANGE ÉQUITABLE</div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom:15px;">Rechercher un item</h2>
            <input type="text" class="modal-search" id="modalSearch" placeholder="Tape le nom de l'item...">
            <div class="modal-grid" id="modalGrid"></div>
        </div>
    </div>

    <!-- MENU LANGUE -->
    <div class="language-bar">
        <select id="languageSelect">
            <option value="fr">🇫🇷 Français</option>
            <option value="en">🇬🇧 English</option>
        </select>
    </div>

    <script>
        const itemsDB = {
            "Duct Tape": {fr: "Ruban Adhésif", price: 420},
            "Metal Bolts": {fr: "Boulons Métal", price: 102},
            "Metal Nuts": {fr: "Écrous Métal", price: 96},
            "Metal Nails": {fr: "Clous Métal", price: 90},
            "Super Glue": {fr: "Super Colle", price: 660},
            "Cotton": {fr: "Coton", price: 300},
            "Ripstop": {fr: "Ripstop", price: 720},
            "Aramid": {fr: "Aramide", price: 1020},
            "Linen": {fr: "Lin", price: 1200},
            "Gunpowder": {fr: "Poudre à Canon", price: 360},
            "Steel Pipe": {fr: "Tuyau Acier", price: 420},
            "Metal": {fr: "Métal", price: 270},
            "Wooden Planks": {fr: "Planches de Bois", price: 174},
            "Motor Oil": {fr: "Huile Moteur", price: 1080},
            "Fuze": {fr: "Détonateur", price: 210},
            "Weapon Part": {fr: "Pièce d'Arme", price: 1200},
            "Copper Coil": {fr: "Bobine de Cuivre", price: 390},
            "AA Battery": {fr: "Pile AA", price: 450},
            "Smartphone": {fr: "Smartphone", price: 6000},
            "GPU": {fr: "Carte Graphique", price: 15000},
            "SSD": {fr: "SSD", price: 2400},
            "RAM": {fr: "RAM", price: 1080},
            "CPU": {fr: "Processeur", price: 4800},
            "CPU Fan": {fr: "Ventilateur CPU", price: 480},
            "PSU": {fr: "Alimentation", price: 3000},
            "PH2 Screwdriver": {fr: "Tournevis PH2", price: 600},
            "Flathead Screwdriver": {fr: "Tournevis Plat", price: 630},
            "Wrench": {fr: "Clé à Molette", price: 360},
            "Hammer": {fr: "Marteau", price: 600},
            "50g Gold": {fr: "50g d'Or", price: 17100},
            "Statue of Solter": {fr: "Statue de Solter", price: 5940},
            "SPS": {fr: "SPS", price: 24000},
            "Gold Watch": {fr: "Montre en Or", price: 15000},
            "Gold Tix": {fr: "Gold Tix", price: 7200},
            "Anton Plushie": {fr: "Peluche Anton", price: 15000},
            "EDF Flare": {fr: "Fusée EDF", price: 375000},
            "Cassette": {fr: "Cassette", price: 375000},
            "Repair Kit": {fr: "Kit de Réparation", price: 15000},
            "Fast MT": {fr: "Fast MT", price: 20000},
            "Altyn": {fr: "Altyn", price: 22500},
            "Quad NVG": {fr: "NVG Quad", price: 65000},
            "TFZ98S": {fr: "TFZ98S", price: 550000},
            "R700": {fr: "R700", price: 500000},
            "AS-VAL": {fr: "AS-VAL", price: 110000},
            "M4A1": {fr: "M4A1", price: 70000},
            "MK12": {fr: "MK12", price: 70000},
            "MK23": {fr: "MK23", price: 15000},
            "SVD": {fr: "SVD", price: 15000},
            "RPG": {fr: "RPG", price: 27500},
            "Saiga": {fr: "Saiga", price: 15000},
            "MP5SD": {fr: "MP5SD", price: 5000},
            "AKMN": {fr: "AKMN", price: 9000},
            "God M4A1": {fr: "God M4A1", price: 525000},
            "God FAST MT": {fr: "God FAST MT", price: 950000},
            "HSPV": {fr: "HSPV", price: 375000},
            "M4A1 Drum Mag": {fr: "M4A1 Drum Mag", price: 275000}
        };

        let leftItems = [], rightItems = [];
        let currentSide = null;
        let currentLang = "fr";

        const translations = {
            fr: { title: "PROJECT DELTA TRADE CALCULATOR", leftTitle: "TU DONNES", rightTitle: "ILS DONNENT", modalTitle: "Rechercher un item", searchPlaceholder: "Tape le nom de l'item...", fair: "⚖️ ÉCHANGE ÉQUITABLE" },
            en: { title: "PROJECT DELTA TRADE CALCULATOR", leftTitle: "YOU GIVE", rightTitle: "THEY GIVE", modalTitle: "Search an item", searchPlaceholder: "Type item name...", fair: "⚖️ FAIR TRADE" }
        };

        function changeLanguage(lang) {
            currentLang = lang;
            document.getElementById('title').textContent = translations[lang].title;
            document.getElementById('leftTitle').textContent = translations[lang].leftTitle;
            document.getElementById('rightTitle').textContent = translations[lang].rightTitle;
            document.getElementById('modalTitle').textContent = translations[lang].modalTitle;
            document.getElementById('modalSearch').placeholder = translations[lang].searchPlaceholder;
            renderAllSlots();
            updateTotals();
        }

        function createSlots() {
            const left = document.getElementById('leftSlots');
            const right = document.getElementById('rightSlots');
            for (let i = 0; i < 6; i++) {
                left.appendChild(createSlot('left'));
                right.appendChild(createSlot('right'));
            }
        }

        function createSlot(side) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.innerHTML = `<span style="font-size:35px;">+</span><small>Ajouter un élément</small>`;
            slot.onclick = () => openModal(side);
            return slot;
        }

        function openModal(side) {
            currentSide = side;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalSearch').value = "";
            renderModalItems("");
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function renderModalItems(filter) {
            const container = document.getElementById('modalGrid');
            container.innerHTML = "";

            Object.keys(itemsDB).forEach(key => {
                const item = itemsDB[key];
                const displayName = item.fr || key;
                if (!displayName.toLowerCase().includes(filter.toLowerCase())) return;

                const card = document.createElement('div');
                card.className = "modal-card";
                card.innerHTML = `<strong>${displayName}</strong><br><small>${item.price.toLocaleString()} ₽</small>`;
                card.onclick = () => addItem(key);
                container.appendChild(card);
            });
        }

        function addItem(key) {
            if (currentSide === 'left') leftItems.push(key);
            else rightItems.push(key);
            renderAllSlots();
            updateTotals();
            closeModal();
        }

        function renderAllSlots() {
            renderSide('leftSlots', leftItems, 'left');
            renderSide('rightSlots', rightItems, 'right');
        }

        function renderSide(containerId, itemsList, side) {
            const container = document.getElementById(containerId);
            const slots = container.children;

            Array.from(slots).forEach((slot, index) => {
                if (index < itemsList.length) {
                    const key = itemsList[index];
                    const item = itemsDB[key];
                    const displayName = item.fr || key;
                    slot.classList.add('added');
                    slot.innerHTML = `<div class="name">${displayName}</div><div class="price">${item.price.toLocaleString()} ₽</div>`;
                    slot.onclick = () => removeItem(side, index);
                } else {
                    slot.classList.remove('added');
                    slot.innerHTML = `<span style="font-size:35px;">+</span><small>Ajouter un élément</small>`;
                    slot.onclick = () => openModal(side);
                }
            });
        }

        function removeItem(side, index) {
            if (side === 'left') leftItems.splice(index, 1);
            else rightItems.splice(index, 1);
            renderAllSlots();
            updateTotals();
        }

        function updateTotals() {
            const leftTotal = leftItems.reduce((sum, key) => sum + itemsDB[key].price, 0);
            const rightTotal = rightItems.reduce((sum, key) => sum + itemsDB[key].price, 0);

            document.getElementById('leftTotal').textContent = leftTotal.toLocaleString();
            document.getElementById('rightTotal').textContent = rightTotal.toLocaleString();

            const diff = rightTotal - leftTotal;
            const res = document.getElementById('result');

            if (diff > 50000) res.textContent = "🟢 EXCELLENT WIN";
            else if (diff > 10000) res.textContent = "🟢 WIN";
            else if (diff < -50000) res.textContent = "🔴 GROS LOSS";
            else if (diff < -10000) res.textContent = "🔴 LOSS";
            else res.textContent = translations[currentLang].fair;
        }

        document.getElementById('modalSearch').addEventListener('input', (e) => renderModalItems(e.target.value));
        document.getElementById('languageSelect').addEventListener('change', (e) => changeLanguage(e.target.value));

        createSlots();
        changeLanguage("fr");
    </script>
</body>
</html>
