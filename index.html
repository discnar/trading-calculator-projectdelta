<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Delta Trade Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .header { 
            text-align: center; 
            margin-bottom: 30px; 
            font-size: 28px; 
            font-weight: bold; 
        }
        .main { 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            flex-wrap: wrap; 
        }
        .panel {
            background: #1a1a1a;
            border-radius: 16px;
            padding: 20px;
            width: 420px;
        }
        .panel h2 { 
            color: #ff4444; 
            margin-bottom: 15px; 
            text-align: center; 
        }
        .slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .slot {
            background: #222;
            border: 2px dashed #444;
            border-radius: 12px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 13px;
        }
        .slot:hover { border-color: #00ccff; }
        .slot.added {
            border: 2px solid #00ccff;
            background: #1f2a1f;
        }
        .slot .name { font-weight: bold; }
        .slot .price { color: #ffcc00; font-size: 12px; }

        /* RESULTAT STYLE COMME TON IMAGE */
        .result-container {
            margin: 30px auto;
            max-width: 420px;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 3px solid;
        }
        .loss {
            background: #2a0f0f;
            border-color: #ff3333;
        }
        .win {
            background: #0f2a0f;
            border-color: #33ff33;
        }
        .fair {
            background: #2a2a0f;
            border-color: #ffcc33;
        }
        .result-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }
        .result-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .diff-label {
            font-size: 16px;
            color: #ccc;
        }
        .diff-value {
            font-size: 42px;
            font-weight: bold;
            margin: 10px 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1a1a1a;
            width: 90%;
            max-width: 720px;
            border-radius: 16px;
            padding: 20px;
        }
        .modal-search {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #111;
            border: none;
            border-radius: 10px;
            color: white;
        }
        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            max-height: 65vh;
            overflow-y: auto;
        }
        .modal-card {
            background: #222;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
        }
        .modal-card:hover {
            background: #00ccff;
            color: black;
        }

        button.reset {
            background: #ff3333;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header">PROJECT DELTA TRADE CALCULATOR</div>

    <div class="main">
        <div class="panel">
            <h2>TU DONNES</h2>
            <div class="slots" id="leftSlots"></div>
            <h3 style="text-align:center; margin-top:15px;">Total : <span id="leftTotal">0</span> $</h3>
        </div>

        <div class="panel">
            <h2>ILS DONNENT</h2>
            <div class="slots" id="rightSlots"></div>
            <h3 style="text-align:center; margin-top:15px;">Total : <span id="rightTotal">0</span> $</h3>
        </div>
    </div>

    <!-- RESULTAT STYLÉ -->
    <div id="resultContainer" class="result-container fair">
        <div id="resultIcon" class="result-icon">⚖️</div>
        <div id="resultTitle" class="result-title">ÉCHANGE ÉQUITABLE</div>
        <div class="diff-label">Différence :</div>
        <div id="diffValue" class="diff-value">0 $</div>
        <button class="reset" onclick="resetAll()">🔄 Réinitialiser le calculateur</button>
    </div>

    <!-- MODAL -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="margin-bottom:15px;">Rechercher un item</h2>
            <input type="text" class="modal-search" id="modalSearch" placeholder="Tape le nom de l'item...">
            <div class="modal-grid" id="modalGrid"></div>
        </div>
    </div>

    <script>
        const itemsDB = { /* tous les items que tu avais */ 
            "Duct Tape": 420, "Metal Bolts": 102, "Metal Nuts": 96, "Metal Nails": 90,
            "Super Glue": 660, "Cotton": 300, "Ripstop": 720, "Aramid": 1020,
            "Linen": 1200, "Gunpowder": 360, "Steel Pipe": 420, "Metal": 270,
            "Wooden Planks": 174, "Motor Oil": 1080, "Fuze": 210, "Weapon Part": 1200,
            "Copper Coil": 390, "AA Battery": 450, "Smartphone": 6000,
            "GPU": 15000, "SSD": 2400, "RAM": 1080, "CPU": 4800,
            "CPU Fan": 480, "PSU": 3000,
            "50g Gold": 17100, "Statue of Solter": 5940, "SPS": 24000,
            "Gold Watch": 15000, "Gold Tix": 7200, "Anton Plushie": 15000,
            "EDF Flare": 375000, "Cassette": 375000, "Repair Kit": 15000,
            "Fast MT": 20000, "Altyn": 22500, "Quad NVG": 65000,
            "TFZ98S": 550000, "R700": 500000, "AS-VAL": 110000,
            "M4A1": 70000, "MK12": 70000, "MK23": 15000,
            "SVD": 15000, "RPG": 27500, "Saiga": 15000,
            "MP5SD": 5000, "AKMN": 9000,
            "God M4A1": 525000, "God FAST MT": 950000,
            "HSPV": 375000, "M4A1 Drum Mag": 275000
        };

        let leftItems = [], rightItems = [];
        let currentSide = null;

        function createSlots() {
            const left = document.getElementById('leftSlots');
            const right = document.getElementById('rightSlots');
            for (let i = 0; i < 6; i++) {
                left.appendChild(createSlot('left'));
                right.appendChild(createSlot('right'));
            }
        }

        function createSlot(side) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            slot.innerHTML = `<span style="font-size:35px;">+</span><small>Ajouter un élément</small>`;
            slot.onclick = () => openModal(side);
            return slot;
        }

        function openModal(side) {
            currentSide = side;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalSearch').value = "";
            renderModalItems("");
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function renderModalItems(filter) {
            const container = document.getElementById('modalGrid');
            container.innerHTML = "";
            Object.keys(itemsDB).forEach(name => {
                if (!name.toLowerCase().includes(filter.toLowerCase())) return;
                const card = document.createElement('div');
                card.className = "modal-card";
                card.innerHTML = `<strong>${name}</strong><br><small>${itemsDB[name].toLocaleString()} $</small>`;
                card.onclick = () => addItem(name);
                container.appendChild(card);
            });
        }

        function addItem(name) {
            if (currentSide === 'left') leftItems.push(name);
            else rightItems.push(name);
            renderAllSlots();
            updateResult();
            closeModal();
        }

        function renderAllSlots() {
            renderSide('leftSlots', leftItems, 'left');
            renderSide('rightSlots', rightItems, 'right');
        }

        function renderSide(containerId, itemsList, side) {
            const container = document.getElementById(containerId);
            const slots = container.children;
            Array.from(slots).forEach((slot, index) => {
                if (index < itemsList.length) {
                    const name = itemsList[index];
                    slot.classList.add('added');
                    slot.innerHTML = `<div class="name">${name}</div><div class="price">${itemsDB[name].toLocaleString()} $</div>`;
                    slot.onclick = () => removeItem(side, index);
                } else {
                    slot.classList.remove('added');
                    slot.innerHTML = `<span style="font-size:35px;">+</span><small>Ajouter un élément</small>`;
                    slot.onclick = () => openModal(side);
                }
            });
        }

        function removeItem(side, index) {
            if (side === 'left') leftItems.splice(index, 1);
            else rightItems.splice(index, 1);
            renderAllSlots();
            updateResult();
        }

        function updateResult() {
            const leftTotal = leftItems.reduce((sum, name) => sum + itemsDB[name], 0);
            const rightTotal = rightItems.reduce((sum, name) => sum + itemsDB[name], 0);

            document.getElementById('leftTotal').textContent = leftTotal.toLocaleString();
            document.getElementById('rightTotal').textContent = rightTotal.toLocaleString();

            const diff = rightTotal - leftTotal;
            const container = document.getElementById('resultContainer');
            const icon = document.getElementById('resultIcon');
            const title = document.getElementById('resultTitle');
            const valueEl = document.getElementById('diffValue');

            valueEl.textContent = (diff >= 0 ? "+" : "") + diff.toLocaleString() + " $";

            if (diff > 600) {
                container.className = "result-container win";
                icon.textContent = "✅";
                title.textContent = "BON COMMERCE";
                title.style.color = "#33ff33";
            } else if (diff < -600) {
                container.className = "result-container loss";
                icon.textContent = "❌";
                title.textContent = "PERTE DE COMMERCE";
                title.style.color = "#ff3333";
            } else {
                container.className = "result-container fair";
                icon.textContent = "⚖️";
                title.textContent = "ÉCHANGE ÉQUITABLE";
                title.style.color = "#ffcc33";
            }
        }

        function resetAll() {
            if (confirm("Réinitialiser tout le calculateur ?")) {
                leftItems = [];
                rightItems = [];
                renderAllSlots();
                updateResult();
            }
        }

        document.getElementById('modalSearch').addEventListener('input', (e) => renderModalItems(e.target.value));

        // Démarrage
        createSlots();
        updateResult();
    </script>
</body>
</html>
